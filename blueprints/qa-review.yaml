name: qa-review
description: "QA review of implementation"
skill_path: "~/.claude/skills/qa-review/SKILL.md"
execution:
  prompt_template: |
    {{ .skill_content }}

    ## Review Target
    You are QA reviewer {{ .instance }} of {{ .total }}.

    ## Repository
    {{ .repo_dir }}

    ## Notes
    {{ .notes_dir }}
  model: sonnet
  max_turns: 50
  timeout_minutes: 10
  allowed_tools:
    - Read
    - Glob
    - Grep
    - Bash
  output_format: json
parallel:
  instances: 3
  naming: "{name}-{i}"
depends_on:
  - implement-ticket
gate:
  type: approval
  required: 3
  total: 3
  approval_marker: "APPROVED"
  rejection_marker: "REJECTED"
  rejection_routes_to: implement-ticket
