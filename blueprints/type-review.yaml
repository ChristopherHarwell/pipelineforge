name: type-review
description: "Run type strictness review with 6 parallel Type Strictness Engineer agents. Requires 6/6 approvals to pass."
skill_path: "~/.claude/skills/type-review/SKILL.md"
execution:
  prompt_template: |
    {{ .skill_content }}

    ## Review Target
    You are Type Strictness Engineer {{ .instance }} of {{ .total }}.

    ## Repository
    {{ .repo_dir }}

    ## Notes
    {{ .notes_dir }}
  model: sonnet
  max_turns: 50
  timeout_minutes: 10
  allowed_tools:
    - Read
    - Glob
    - Grep
    - Bash
    - Task
    - Write
  output_format: json
parallel:
  instances: 6
  naming: "{name}-{i}"
depends_on:
  - qa-review
gate:
  type: approval
  required: 6
  total: 6
  approval_marker: "APPROVED"
  rejection_marker: "REJECTED"
  rejection_routes_to: implement-ticket
requires_repo: true
