name: assign-tickets
description: "Break feature into implementable tickets from TRD"
skill_path: "~/.claude/skills/assign-tickets/SKILL.md"
execution:
  prompt_template: |
    {{ .skill_content }}

    ## TRD Location
    {{ .Steps.project-init.outputs.output }}

    ## Notes Directory
    {{ .notes_dir }}
  model: opus
  max_turns: 80
  timeout_minutes: 15
  allowed_tools:
    - Read
    - Write
    - Glob
    - Grep
  output_format: json
requires_repo: false
depends_on:
  - project-init
gate:
  type: quality
  quality_checks:
    - check: exit_code
outputs:
  tickets_dir: "{{ .notes_dir }}/tickets/"
